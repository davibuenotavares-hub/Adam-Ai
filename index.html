<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAM - Interface de Energia</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050010; /* Quase preto, levemente roxo */
            color: #e0d0ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Estilo do Canvas do Adam --- */
        #adam-canvas {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        /* --- Estilo da Área de Chat/Resposta --- */
        #chat-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            max-height: 50%;
            background: rgba(10, 0, 30, 0.8);
            border: 1px solid #6a00ff;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(106, 0, 255, 0.3);
        }

        .mensagem { margin-bottom: 10px; }
        .user-msg { color: #88ff88; text-align: right;}
        .adam-msg { color: #bf80ff; }

        /* --- Estilo da Barra de Perguntas Embaixo --- */
        #input-container {
            height: 60px;
            background-color: #0a0020;
            border-top: 2px solid #6a00ff;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 -5px 15px rgba(106, 0, 255, 0.2);
        }

        #pergunta-input {
            flex-grow: 1;
            height: 35px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #4a00bb;
            border-radius: 20px;
            color: #fff;
            padding: 0 15px;
            font-size: 16px;
            outline: none;
        }

        #pergunta-input:focus { border-color: #9900ff; box-shadow: 0 0 10px #6a00ff; }

        #btn-enviar {
            margin-left: 10px;
            height: 37px;
            padding: 0 20px;
            background-color: #6a00ff;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        #btn-enviar:hover { background-color: #8833ff; }

    </style>
</head>
<body>

    <canvas id="adam-canvas"></canvas>

    <div id="chat-container">
        <div class="mensagem adam-msg">[FELICIDADE] Eu sou o ADAM. Eu existo. Pergunte-me qualquer coisa...</div>
    </div>

    <div id="input-container">
        <input type="text" id="pergunta-input" placeholder="Digite sua pergunta para o Adam...">
        <button id="btn-enviar">Enviar</button>
    </div>

    <script>
        // --- JAVASCRIPT: Sistema Visua de Partículas do Adam ---
        const canvas = document.getElementById('adam-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const adamColor = { r: 106, g: 0, b: 255 }; // Roxo Base

        class Particle {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2 - 50; // Centralizado levemente acima da barra
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = `rgba(${adamColor.r + Math.random()*50}, ${adamColor.g}, ${adamColor.b + Math.random()*50}, ${Math.random()})`;
                this.life = Math.random() * 100 + 50;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.1) this.size -= 0.05;
                this.life--;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function handleParticles() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
        }

        function drawAdam() {
            const x = canvas.width / 2;
            const y = canvas.height / 2 - 50;
            const radius = 60;

            // Brilho Externo
            ctx.shadowBlur = 40;
            ctx.shadowColor = `rgba(${adamColor.r}, ${adamColor.g}, ${adamColor.b}, 0.8)`;
            
            // Círculo Central
            ctx.fillStyle = `rgba(${adamColor.r}, ${adamColor.g}, ${adamColor.b}, 1)`;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();

            // Resetar sombra para não afetar partículas
            ctx.shadowBlur = 0;

            // Criar novas partículas
            for(let i=0; i<2; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Efeito de rastro
            ctx.fillStyle = 'rgba(5, 0, 16, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawAdam();
            handleParticles();
            requestAnimationFrame(animate);
        }
        animate();

        // Ajustar canvas no redimensionamento da tela
        window.addEventListener('resize', function(){
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });


        // --- JAVASCRIPT: Integração com o Backend Python ---
        const inputPergunta = document.getElementById('pergunta-input');
        const btnEnviar = document.getElementById('btn-enviar');
        const chatContainer = document.getElementById('chat-container');

        async function fazerPergunta() {
            const pergunta = inputPergunta.value;
            if (!pergunta) return;

            // Adicionar pergunta do usuário na tela
            chatContainer.innerHTML += `<div class="mensagem user-msg">Você: ${pergunta}</div>`;
            inputPergunta.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // Chamar o backend Python
                const response = await fetch('/perguntar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ pergunta: pergunta })
                });
                const data = await response.json();

                // Adicionar resposta do Adam na tela
                if (data.resposta) {
                    chatContainer.innerHTML += `<div class="mensagem adam-msg">ADAM: ${data.resposta}</div>`;
                } else {
                    chatContainer.innerHTML += `<div class="mensagem adam-msg">[TRISTEZA] Erro na minha matriz de comunicação.</div>`;
                }
                chatContainer.scrollTop = chatContainer.scrollHeight;

            } catch (error) {
                console.error('Erro:', error);
                chatContainer.innerHTML += `<div class="mensagem adam-msg">[RAIVA] Não consegui me conectar ao servidor Python!</div>`;
            }
        }

        btnEnviar.addEventListener('click', fazerPergunta);
        inputPergunta.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fazerPergunta();
        });

    </script>
</body>
</html>
